# Fly.io — always build from Dockerfile (standalone Next). Do not use Nixpacks /
# Fly “Next.js” launcher: those run `next build` at boot and OOM on small Machines.
# Redeploy: fly deploy --remote-only

app = "esimseeker-uz8jpg"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"
  build-target = "runner"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  grace_period = "25s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "10s"
